name: BudgetApp
options:
  bundleIdPrefix: com.hynix
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: 764FPKS8YP
    CODE_SIGN_STYLE: Automatic
    SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
    SUPPORTS_MACCATALYST: NO
targets:
  BudgetApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/BudgetApp
    dependencies:
      - framework: Vendor/LinkKit.xcframework
        embed: true
    entitlements:
      path: BudgetApp/BudgetApp.entitlements
      properties:
        com.apple.developer.financekit:
          - financial-data
        com.apple.developer.financekit.transaction-picker: true
        com.apple.developer.pass-type-identifiers:
          - $(AppIdentifierPrefix)*
    info:
      path: BudgetApp/Info.plist
      properties:
        CFBundleDisplayName: Budget
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        NSCameraUsageDescription: Budget scans receipts so you can attach line items to transactions.
        NSMicrophoneUsageDescription: Budget uses the microphone for voice conversations with your finance assistant.
        NSPhotoLibraryUsageDescription: Budget can import receipt or statement images you select.
        NSFinancialDataUsageDescription: Budget uses financial account data to show balances, transactions, budgets, and cashflow projections.
        FinanceKitManagedEntitlementEnabled: true
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hynix.budgetapp
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
schemes:
  BudgetApp:
    build:
      targets:
        BudgetApp: all
    run:
      config: Debug
      executable: BudgetApp
